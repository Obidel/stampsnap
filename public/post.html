<script>
const STRAPI_URL = 'https://cms.stampsnap.site';

function renderContent(blocks) {
  if (typeof blocks === 'string') return blocks;
  if (!Array.isArray(blocks)) return '';
  return blocks.map(block => {
    const text = block.children?.map(c => c.text || '').join('') || '';
    switch (block.type) {
      case 'heading': return `<h3 class="font-headline-md text-headline-md text-primary mt-8 mb-3">${text}</h3>`;
      case 'list':
        const tag = block.format === 'ordered' ? 'ol' : 'ul';
        const items = block.children?.map(li => `<li>${li.children?.map(c => c.text).join('') || ''}</li>`).join('') || '';
        return `<${tag} class="list-inside list-disc space-y-1 mb-4">${items}</${tag}>`;
      case 'quote': return `<blockquote class="border-l-4 border-secondary pl-4 italic my-4">${text}</blockquote>`;
      case 'code': return `<pre class="bg-surface-container p-4 rounded-lg overflow-x-auto my-4 text-sm"><code>${text}</code></pre>`;
      default: return `<p class="mb-4">${text}</p>`;
    }
  }).join('\n');
}

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const loading = document.getElementById('loading-state');
  const container = document.getElementById('post-content');

  if (!slug) {
    loading.innerHTML = `<div class="text-center py-20">
      <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4">search_off</span>
      <h1 class="font-headline-md text-headline-md text-primary mb-4">No article specified</h1>
      <a href="/blog.html" class="bg-primary text-on-primary font-label-sm text-label-sm px-8 py-3 rounded-lg inline-flex items-center gap-2">Back to Blog</a>
    </div>`;
    return;
  }

  try {
    const res = await fetch(`${STRAPI_URL}/api/posts?filters[slug][$eq]=${slug}`);
    const json = await res.json();
    const post = json.data?.[0];

    if (!post) throw new Error('Not found');

    const attrs = post;
    const date = attrs.date ? new Date(attrs.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';

    loading.classList.add('hidden');
    container.classList.remove('hidden');
    container.innerHTML = `
      <a href="/blog.html" class="inline-flex items-center gap-2 text-primary font-label-sm text-label-sm mb-6 hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Blog
      </a>
      <div class="flex items-center gap-3 mb-4">
        ${attrs.category ? `<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider bg-secondary-fixed px-3 py-1 rounded-sm">${attrs.category}</span>` : ''}
        ${date ? `<span class="text-on-surface-variant font-body-md text-sm">${date}</span>` : ''}
      </div>
      <h1 class="font-display-lg text-display-lg text-primary mb-8">${attrs.title}</h1>
      <div class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
        ${renderContent(attrs.content)}
      </div>
      <div class="mt-12 pt-8 border-t border-outline-variant">
        <a href="/blog.html" class="bg-primary text-on-primary font-label-sm text-label-sm px-8 py-3 rounded-lg inline-flex items-center gap-2 hover:opacity-90 transition-opacity">
          <span class="material-symbols-outlined text-sm">arrow_back</span> More Articles
        </a>
      </div>
    `;
  } catch (err) {
    loading.innerHTML = `<div class="text-center py-20">
      <span class="material-symbols-outlined text-6xl text-on-surface-variant mb-4">search_off</span>
      <h1 class="font-headline-md text-headline-md text-primary mb-4">Article Not Found</h1>
      <p class="font-body-md text-body-md text-on-surface-variant mb-6">The article could not be loaded.</p>
      <a href="/blog.html" class="bg-primary text-on-primary font-label-sm text-label-sm px-8 py-3 rounded-lg inline-flex items-center gap-2">Back to Blog</a>
    </div>`;
  }
});
</script>
