<!DOCTYPE html>

<meta charset="utf-8"/>

</script>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col paper-texture">
<div class="flex-1 flex items-center justify-center px-margin-mobile py-12">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<a href="/" class="font-display-lg text-display-lg text-primary tracking-tighter">StampSnap</a>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Sign in to your account</p>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 soft-shadow">
<form id="login-form" class="space-y-6">
<div id="error-msg" class="hidden bg-error-container text-on-error-container font-label-sm text-label-sm p-3 rounded-lg"></div>
<div>
<label class="font-label-sm text-label-sm text-primary block mb-2">Email</label>
<input type="email" id="email" required class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="your@email.com">
</div>
<div>
<label class="font-label-sm text-label-sm text-primary block mb-2">Password</label>
<input type="password" id="password" required class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="••••••••">
</div>
<button type="submit" class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-3 rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-all shadow-sm flex items-center justify-center gap-2">
<span id="btn-text">Sign In</span>
<span id="btn-spinner" class="hidden"><svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>
</button>
</form>
<p class="text-center mt-6 font-body-md text-body-md text-on-surface-variant">
Don't have an account? <a href="/signup.html" class="text-primary font-semibold hover:underline">Get Started</a>
</p>
</div>
</div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btnText = document.getElementById('btn-text');
  const btnSpinner = document.getElementById('btn-spinner');
  const errorMsg = document.getElementById('error-msg');
  btnText.classList.add('hidden');
  btnSpinner.classList.remove('hidden');
  errorMsg.classList.add('hidden');
  try {
    const data = await apiRequest('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    localStorage.setItem('stampsnap_token', data.token);
    localStorage.setItem('stampsnap_user', JSON.stringify(data.user));
    window.location.href = '/app.html';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.classList.remove('hidden');
  } finally {
    btnText.classList.remove('hidden');
    btnSpinner.classList.add('hidden');
  }
});
</script>
</body>
</html>
