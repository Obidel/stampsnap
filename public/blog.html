<script>
const STRAPI_URL = 'https://cms.stampsnap.site';

async function loadPosts() {
  const container = document.getElementById('posts-grid');
  try {
    const res = await fetch(`${STRAPI_URL}/api/posts`);
    const json = await res.json();
    const posts = json.data || [];

    if (posts.length === 0) {
      container.innerHTML = '<p class="col-span-full text-center py-12 font-body-md text-body-md text-on-surface-variant">No posts yet. Check back soon!</p>';
      return;
    }

    container.innerHTML = posts.map(p => {
      const attrs = p;
      const date = attrs.date ? new Date(attrs.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';
      return `<a href="/post.html?slug=${attrs.slug}" class="block bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden hover:shadow-lg transition-all hover:-translate-y-1 group">
        <div class="aspect-[3/2] bg-surface-variant overflow-hidden flex items-center justify-center text-on-surface-variant">
          <span class="material-symbols-outlined text-6xl">auto_stories</span>
        </div>
        <div class="p-5">
          <div class="flex items-center gap-2 mb-2">
            <span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">${attrs.category || 'General'}</span>
            ${date ? `<span class="text-xs text-on-surface-variant">&middot;</span><span class="font-body-md text-xs text-on-surface-variant">${date}</span>` : ''}
          </div>
          <h2 class="font-headline-md text-headline-md text-primary group-hover:text-secondary transition-colors">${attrs.title}</h2>
          <p class="font-body-md text-body-md text-on-surface-variant mt-2 line-clamp-2">${attrs.excerpt || ''}</p>
        </div>
      </a>`;
    }).join('');
  } catch (err) {
    container.innerHTML = '<p class="col-span-full text-center py-12 font-body-md text-body-md text-on-surface-variant">Failed to load posts. Please try again later.</p>';
  }
}

document.addEventListener('DOMContentLoaded', loadPosts);
</script>
